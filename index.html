<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元素記号コレクションバトル</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --primary-color: #4a90e2;
            --accent-color: #e74c3c;
            --double-color: #ffeb3b;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- UI本体 --- */
        header {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        .periodic-table {
            display: grid;
            grid-template-columns: repeat(18, 1fr);
            gap: 2px;
            background: #ccc;
            padding: 5px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .element-cell {
            width: 40px;
            height: 50px;
            background: #eee;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            font-weight: bold;
            color: transparent;
        }

        .element-cell.filled {
            background: var(--primary-color);
            color: white;
            border: 1px solid #fff;
        }

/* 2倍ルールの枠を緑に変更 */
.element-cell.double-zone {
    border: 2px solid #2ecc71; /* 緑色 */
    background: #eafaf1;
}

.element-cell.filled.double-zone {
    background: #2ecc71; /* 正解時も緑 */
    color: white;
}

/* ゲーム終了時：未入力の場所を赤くするクラス */
.element-cell.not-filled-end {
    background: #ffcccc !important;
    border: 1px solid #e74c3c !important;
    color: #e74c3c !important;
    opacity: 0.7;
}

        /* --- プレイヤー情報 & 操作 --- */
        .game-info {
            text-align: center;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
        }

        .status-display {
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        .input-area input {
            padding: 10px;
            font-size: 1rem;
            width: 80px;
            text-transform: capitalize;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            transition: 0.2s;
        }

        .btn-main { background: var(--primary-color); color: white; }
        .btn-danger { background: var(--accent-color); color: white; }
        .btn-settings { background: #666; color: white; }

        /* --- モーダル --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
        }

        .setting-item { margin-bottom: 15px; }
        .setting-item label { display: block; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>元素記号バトル</h1>
    <button class="btn-settings" onclick="openModal()">⚙ 設定</button>
</header>

<div class="periodic-table" id="table"></div>

<div class="game-info">
    <div id="currentPlayerDisplay" class="status-display">
        設定からゲームを開始してください
    </div>
    <div id="playerStats" style="margin-bottom: 15px;"></div>
    
    <div class="input-area">
        <input type="text" id="symbolInput" placeholder="例: H" maxlength="2">
        <button class="btn-main" onclick="handleSubmit()">送信</button>
        <button class="btn-danger" onclick="surrender()">降参</button>
    </div>
    <p id="message" style="color: #e74c3c; min-height: 1.2rem;"></p>
</div>

<div class="modal" id="settingsModal">
    <div class="modal-content">
        <h2>ゲーム設定</h2>
        <div class="setting-item">
            <label>参加人数</label>
            <input type="number" id="playerCount" value="2" min="1" max="4" onchange="updatePlayerNameInputs()">
        </div>
        <div id="playerNameContainer"></div>
        <div class="setting-item">
            <label><input type="checkbox" id="doubleRule"> 2倍ルール(赤枠)を適用</label>
        </div>
        <div class="setting-item">
            <label>ライフ設定</label>
            <select id="lifeSetting">
                <option value="0">なし</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3" selected>3</option>
                <option value="5">5</option>
            </select>
        </div>
        <button class="btn-main" style="width: 100%;" onclick="startGame()">ゲームスタート</button>
    </div>
</div>

<script>
    
// 原子番号1〜118までの全データ
const ELEMENT_DATA = [
    { s: "H", r: 1, c: 1 }, { s: "He", r: 1, c: 18 },
    { s: "Li", r: 2, c: 1 }, { s: "Be", r: 2, c: 2 }, { s: "B", r: 2, c: 13 }, { s: "C", r: 2, c: 14 }, { s: "N", r: 2, c: 15 }, { s: "O", r: 2, c: 16 }, { s: "F", r: 2, c: 17 }, { s: "Ne", r: 2, c: 18 },
    { s: "Na", r: 3, c: 1 }, { s: "Mg", r: 3, c: 2 }, { s: "Al", r: 3, c: 13 }, { s: "Si", r: 3, c: 14 }, { s: "P", r: 3, c: 15 }, { s: "S", r: 3, c: 16 }, { s: "Cl", r: 3, c: 17 }, { s: "Ar", r: 3, c: 18 },
    { s: "K", r: 4, c: 1 }, { s: "Ca", r: 4, c: 2 }, { s: "Sc", r: 4, c: 3 }, { s: "Ti", r: 4, c: 4 }, { s: "V", r: 4, c: 5 }, { s: "Cr", r: 4, c: 6 }, { s: "Mn", r: 4, c: 7 }, { s: "Fe", r: 4, c: 8 }, { s: "Co", r: 4, c: 9 }, { s: "Ni", r: 4, c: 10 }, { s: "Cu", r: 4, c: 11 }, { s: "Zn", r: 4, c: 12 }, { s: "Ga", r: 4, c: 13 }, { s: "Ge", r: 4, c: 14 }, { s: "As", r: 4, c: 15 }, { s: "Se", r: 4, c: 16 }, { s: "Br", r: 4, c: 17 }, { s: "Kr", r: 4, c: 18 },
    { s: "Rb", r: 5, c: 1 }, { s: "Sr", r: 5, c: 2 }, { s: "Y", r: 5, c: 3 }, { s: "Zr", r: 5, c: 4 }, { s: "Nb", r: 5, c: 5 }, { s: "Mo", r: 5, c: 6 }, { s: "Tc", r: 5, c: 7 }, { s: "Ru", r: 5, c: 8 }, { s: "Rh", r: 5, c: 9 }, { s: "Pd", r: 5, c: 10 }, { s: "Ag", r: 5, c: 11 }, { s: "Cd", r: 5, c: 12 }, { s: "In", r: 5, c: 13 }, { s: "Sn", r: 5, c: 14 }, { s: "Sb", r: 5, c: 15 }, { s: "Te", r: 5, c: 16 }, { s: "I", r: 5, c: 17 }, { s: "Xe", r: 5, c: 18 },
    { s: "Cs", r: 6, c: 1 }, { s: "Ba", r: 6, c: 2 }, { s: "La", r: 6, c: 3 }, { s: "Ce", r: 9, c: 4 }, { s: "Pr", r: 9, c: 5 }, { s: "Nd", r: 9, c: 6 }, { s: "Pm", r: 9, c: 7 }, { s: "Sm", r: 9, c: 8 }, { s: "Eu", r: 9, c: 9 }, { s: "Gd", r: 9, c: 10 }, { s: "Tb", r: 9, c: 11 }, { s: "Dy", r: 9, c: 12 }, { s: "Ho", r: 9, c: 13 }, { s: "Er", r: 9, c: 14 }, { s: "Tm", r: 9, c: 15 }, { s: "Yb", r: 9, c: 16 }, { s: "Lu", r: 9, c: 17 }, { s: "Hf", r: 6, c: 4 }, { s: "Ta", r: 6, c: 5 }, { s: "W", r: 6, c: 6 }, { s: "Re", r: 6, c: 7 }, { s: "Os", r: 6, c: 8 }, { s: "Ir", r: 6, c: 9 }, { s: "Pt", r: 6, c: 10 }, { s: "Au", r: 6, c: 11 }, { s: "Hg", r: 6, c: 12 }, { s: "Tl", r: 6, c: 13 }, { s: "Pb", r: 6, c: 14 }, { s: "Bi", r: 6, c: 15 }, { s: "Po", r: 6, c: 16 }, { s: "At", r: 6, c: 17 }, { s: "Rn", r: 6, c: 18 },
    { s: "Fr", r: 7, c: 1 }, { s: "Ra", r: 7, c: 2 }, { s: "Ac", r: 7, c: 3 }, { s: "Th", r: 10, c: 4 }, { s: "Pa", r: 10, c: 5 }, { s: "U", r: 10, c: 6 }, { s: "Np", r: 10, c: 7 }, { s: "Pu", r: 10, c: 8 }, { s: "Am", r: 10, c: 9 }, { s: "Cm", r: 10, c: 10 }, { s: "Bk", r: 10, c: 11 }, { s: "Cf", r: 10, c: 12 }, { s: "Es", r: 10, c: 13 }, { s: "Fm", r: 10, c: 14 }, { s: "Md", r: 10, c: 15 }, { s: "No", r: 10, c: 16 }, { s: "Lr", r: 10, c: 17 }, { s: "Rf", r: 7, c: 4 }, { s: "Db", r: 7, c: 5 }, { s: "Sg", r: 7, c: 6 }, { s: "Bh", r: 7, c: 7 }, { s: "Hs", r: 7, c: 8 }, { s: "Mt", r: 7, c: 9 }, { s: "Ds", r: 7, c: 10 }, { s: "Rg", r: 7, c: 11 }, { s: "Cn", r: 7, c: 12 }, { s: "Nh", r: 7, c: 13 }, { s: "Fl", r: 7, c: 14 }, { s: "Mc", r: 7, c: 15 }, { s: "Lv", r: 7, c: 16 }, { s: "Ts", r: 7, c: 17 }, { s: "Og", r: 7, c: 18 }
];

    let gameState = {
        players: [],
        currentPlayerIndex: 0,
        answered: new Set(),
        doubleZones: new Set(),
        isGameOver: false,
        maxLife: 0
    };

function initTable() {
    const tableDiv = document.getElementById('table');
    tableDiv.innerHTML = '';
    
    // 10行(ランタノイド用含む) × 18列 のマス目を作成
    for (let r = 1; r <= 10; r++) {
        for (let c = 1; c <= 18; c++) {
            const cell = document.createElement('div');
            cell.className = 'element-cell';
            cell.id = `cell-${r}-${c}`;
            
            // 該当する座標に元素があるか探す
            const element = ELEMENT_DATA.find(e => e.r === r && e.c === c);
            
            if (element) {
                cell.innerText = element.s;
                cell.dataset.symbol = element.s;
            } else {
                // 元素がないマスは透明（または8行目ならスペーサー）
                cell.style.visibility = 'hidden';
                if (r === 8) cell.style.height = '20px'; // 隙間を作る
            }
            tableDiv.appendChild(cell);
        }
    }
}

    function openModal() {
        document.getElementById('settingsModal').style.display = 'flex';
        updatePlayerNameInputs();
    }

    function updatePlayerNameInputs() {
        const count = document.getElementById('playerCount').value;
        const container = document.getElementById('playerNameContainer');
        container.innerHTML = '';
        for(let i=1; i<=count; i++) {
            container.innerHTML += `<div class="setting-item"><input type="text" id="pName${i}" value="プレイヤー${i}"></div>`;
        }
    }

function startGame() {
    const count = document.getElementById('playerCount').value;
    gameState.players = [];
    gameState.maxLife = parseInt(document.getElementById('lifeSetting').value);
    
    for(let i=1; i<=count; i++) {
        gameState.players.push({
            name: document.getElementById(`pName${i}`).value,
            score: 0,
            life: gameState.maxLife
        });
    }

    gameState.doubleZones.clear();
    // 2倍ルールの判定部分を修正
    if(document.getElementById('doubleRule').checked) {
        // ELEMENT_DATAからランダムに10個の記号を選ぶ
        while(gameState.doubleZones.size < 10) {
            const randomIndex = Math.floor(Math.random() * ELEMENT_DATA.length);
            const randomSymbol = ELEMENT_DATA[randomIndex].s; // .s で記号を取得
            gameState.doubleZones.add(randomSymbol);
        }
    }

    gameState.answered.clear();
    gameState.currentPlayerIndex = 0;
    gameState.isGameOver = false;
    
    initTable();
    
    // 2倍ゾーンの描画
    gameState.doubleZones.forEach(sym => {
        const cells = document.querySelectorAll(`[data-symbol="${sym}"]`);
        cells.forEach(c => c.classList.add('double-zone'));
    });

    document.getElementById('settingsModal').style.display = 'none';
    updateUI();
}

    function updateUI() {
        if(gameState.isGameOver) return;

        const currentP = gameState.players[gameState.currentPlayerIndex];
        document.getElementById('currentPlayerDisplay').innerText = `💡 ${currentP.name} のターン`;
        
        let statsHtml = '';
        gameState.players.forEach(p => {
            const lifeStr = gameState.maxLife > 0 ? ` | ❤️:${p.life}` : '';
            statsHtml += `<div>${p.name}: ${p.score}pt${lifeStr}</div>`;
        });
        document.getElementById('playerStats').innerHTML = statsHtml;
    }

function handleSubmit() {
    if(gameState.isGameOver) return;

    const input = document.getElementById('symbolInput');
    const symbol = input.value.trim(); // 入力された値
    const msg = document.getElementById('message');
    const currentP = gameState.players[gameState.currentPlayerIndex];

    // --- ここに判定ロジックを入れます ---

    // 1. そもそも実在するか判定
    const isValid = ELEMENT_DATA.some(e => e.s === symbol);
    
    // 2. すでに回答済みか判定
    const isAnswered = gameState.answered.has(symbol);

    if (!isValid) {
        // 実在しない場合：ペナルティ
        msg.innerText = `❌ 「${symbol}」は実在しません (-1pt)`;
        currentP.score--;
        if(gameState.maxLife > 0) currentP.life--;
    } else if (isAnswered) {
        // 実在するが回答済み：もう一度
        msg.innerText = `⚠️ 「${symbol}」は既に出ています！`;
        input.value = "";
        return; // ターンを交代せずに終了（もう一度入力させる）
    } else {
        // 正解：ポイント加算と周期表への反映
        msg.innerText = `✅ 「${symbol}」正解！`;
        gameState.answered.add(symbol);
        
        let points = 1;
        // 2倍ルール判定
        if(gameState.doubleZones.has(symbol)) {
            points = 2;
            msg.innerText = `🔥 2倍ゾーン！ 「${symbol}」で2pt獲得！`;
        }
        currentP.score += points;

        // 周期表の見た目を更新（塗りつぶし）
        const cells = document.querySelectorAll(`[data-symbol="${symbol}"]`);
        cells.forEach(c => c.classList.add('filled'));
    }

    // --- 判定後の処理 ---

    input.value = ""; // 入力欄をクリア

    // 終了判定（ポイントマイナスまたはライフ0）
    if (currentP.score < 0 || (gameState.maxLife > 0 && currentP.life <= 0)) {
        endGame(`${currentP.name} のライフまたはポイントが尽きました。`);
        return;
    }

    // 次のプレイヤーへ交代
    gameState.currentPlayerIndex = (gameState.currentPlayerIndex + 1) % gameState.players.length;
    updateUI();
}

    function surrender() {
        const currentP = gameState.players[gameState.currentPlayerIndex];
        endGame(`${currentP.name} が降参しました。`);
    }

function endGame(reason) {
    gameState.isGameOver = true;
    document.getElementById('currentPlayerDisplay').innerText = "🏁 GAME OVER";
    document.getElementById('message').innerText = reason;

    // --- 追加：未入力の元素を赤く表示 ---
    const allCells = document.querySelectorAll('.element-cell');
    allCells.forEach(cell => {
        // 元素が存在するマスで、かつ正解（filled）していない場合
        if (cell.dataset.symbol && !cell.classList.contains('filled')) {
            cell.classList.add('not-filled-end');
            // せっかくなので記号も見えるようにする
            cell.style.color = '#e74c3c';
        }
    });
    // ---------------------------------

    // 勝者判定
    const winner = [...gameState.players].sort((a,b) => b.score - a.score)[0];
    setTimeout(() => {
        alert(`${reason}\n優勝は ${winner.name} (${winner.score}pt) です！`);
    }, 500); // 少し間を置いてからアラートを出す
}

    // Enterキーで送信
    document.getElementById('symbolInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleSubmit();
    });

    initTable();
</script>

</body>
</html>
