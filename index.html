<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元素記号コレクションバトル</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --primary-color: #4a90e2;
            --accent-color: #e74c3c;
            --double-color: #ffeb3b;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- UI本体 --- */
        header {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        .periodic-table {
            display: grid;
            grid-template-columns: repeat(18, 1fr);
            gap: 2px;
            background: #ccc;
            padding: 5px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

.element-cell {
    width: 45px;
    height: 55px; /* 高さを少し拡張 */
    background: #eee;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    color: transparent; /* 通常時は見えない */
    line-height: 1.1;
    border-radius: 3px;
}

/* 記号のスタイル */
.symbol {
    font-size: 14px;
}

/* 名前のスタイル */
.name {
    font-size: 8px; /* 日本語は小さめに */
    font-weight: normal;
}

        .element-cell.filled {
            background: var(--primary-color);
            color: white;
            border: 1px solid #fff;
        }

/* 2倍ルールの枠を緑に変更 */
.element-cell.double-zone {
    border: 2px solid #2ecc71; /* 緑色 */
    background: #eafaf1;
}

.element-cell.filled.double-zone {
    background: #2ecc71; /* 正解時も緑 */
    color: white;
}

/* ゲーム終了時：未入力の場所を赤くするクラス */
.element-cell.not-filled-end {
    background: #ffcccc !important;
    border: 1px solid #e74c3c !important;
    color: #e74c3c !important;
    opacity: 0.7;
}

        /* --- プレイヤー情報 & 操作 --- */
        .game-info {
            text-align: center;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
        }

        .status-display {
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        .input-area input {
            padding: 10px;
            font-size: 1rem;
            width: 80px;
            text-transform: capitalize;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            transition: 0.2s;
        }

        .btn-main { background: var(--primary-color); color: white; }
        .btn-danger { background: var(--accent-color); color: white; }
        .btn-settings { background: #666; color: white; }

        /* --- モーダル --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
        }

        .setting-item { margin-bottom: 15px; }
        .setting-item label { display: block; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>元素記号バトル</h1>
    <button class="btn-settings" onclick="openModal()">⚙ 設定</button>
</header>

<div class="periodic-table" id="table"></div>

<div class="game-info">
    <div id="currentPlayerDisplay" class="status-display">
        設定からゲームを開始してください
    </div>
    <div id="playerStats" style="margin-bottom: 15px;"></div>
    
    <div class="input-area">
        <input type="text" id="symbolInput" placeholder="例: H" maxlength="2">
        <button class="btn-main" onclick="handleSubmit()">送信</button>
        <button class="btn-danger" onclick="surrender()">降参</button>
    </div>
    <p id="message" style="color: #e74c3c; min-height: 1.2rem;"></p>
</div>

<div class="modal" id="settingsModal">
    <div class="modal-content">
        <h2>ゲーム設定</h2>
        <div class="setting-item">
            <label>参加人数</label>
            <input type="number" id="playerCount" value="2" min="1" max="4" onchange="updatePlayerNameInputs()">
        </div>
        <div id="playerNameContainer"></div>
        <div class="setting-item">
            <label><input type="checkbox" id="doubleRule"> 2倍ルール(赤枠)を適用</label>
        </div>
        <div class="setting-item">
            <label>ライフ設定</label>
            <select id="lifeSetting">
                <option value="0">なし</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3" selected>3</option>
                <option value="5">5</option>
            </select>
        </div>
        <button class="btn-main" style="width: 100%;" onclick="startGame()">ゲームスタート</button>
    </div>
</div>

<script>
    
// 原子番号1〜118までの全データ
const ELEMENT_DATA = [
    { s: "H", n: "水素", r: 1, c: 1 }, { s: "He", n: "ヘリウム", r: 1, c: 18 },
    { s: "Li", n: "リチウム", r: 2, c: 1 }, { s: "Be", n: "ベリリウム", r: 2, c: 2 }, { s: "B", n: "ホウ素", r: 2, c: 13 }, { s: "C", n: "炭素", r: 2, c: 14 }, { s: "N", n: "窒素", r: 2, c: 15 }, { s: "O", n: "酸素", r: 2, c: 16 }, { s: "F", n: "フッ素", r: 2, c: 17 }, { s: "Ne", n: "ネオン", r: 2, c: 18 },
    { s: "Na", n: "ナトリウム", r: 3, c: 1 }, { s: "Mg", n: "マグネシウム", r: 3, c: 2 }, { s: "Al", n: "アルミニウム", r: 3, c: 13 }, { s: "Si", n: "ケイ素", r: 3, c: 14 }, { s: "P", n: "リン", r: 3, c: 15 }, { s: "S", n: "硫黄", r: 3, c: 16 }, { s: "Cl", n: "塩素", r: 3, c: 17 }, { s: "Ar", n: "アルゴン", r: 3, c: 18 },
    { s: "K", n: "カリウム", r: 4, c: 1 }, { s: "Ca", n: "カルシウム", r: 4, c: 2 }, { s: "Sc", n: "スカンジウム", r: 4, c: 3 }, { s: "Ti", n: "チタン", r: 4, c: 4 }, { s: "V", n: "バナジウム", r: 4, c: 5 }, { s: "Cr", n: "クロム", r: 4, c: 6 }, { s: "Mn", n: "マンガン", r: 4, c: 7 }, { s: "Fe", n: "鉄", r: 4, c: 8 }, { s: "Co", n: "コバルト", r: 4, c: 9 }, { s: "Ni", n: "ニッケル", r: 4, c: 10 }, { s: "Cu", n: "銅", r: 4, c: 11 }, { s: "Zn", n: "亜鉛", r: 4, c: 12 }, { s: "Ga", n: "ガリウム", r: 4, c: 13 }, { s: "Ge", n: "ゲルマニウム", r: 4, c: 14 }, { s: "As", n: "ヒ素", r: 4, c: 15 }, { s: "Se", n: "セレン", r: 4, c: 16 }, { s: "Br", n: "臭素", r: 4, c: 17 }, { s: "Kr", n: "クリプトン", r: 4, c: 18 },
    { s: "Rb", n: "ルビジウム", r: 5, c: 1 }, { s: "Sr", n: "ストロンチウム", r: 5, c: 2 }, { s: "Y", n: "イットリウム", r: 5, c: 3 }, { s: "Zr", n: "ジルコニウム", r: 5, c: 4 }, { s: "Nb", n: "ニオブ", r: 5, c: 5 }, { s: "Mo", n: "モリブデン", r: 5, c: 6 }, { s: "Tc", n: "テクネチウム", r: 5, c: 7 }, { s: "Ru", n: "ルテニウム", r: 5, c: 8 }, { s: "Rh", n: "ロジウム", r: 5, c: 9 }, { s: "Pd", n: "パラジウム", r: 5, c: 10 }, { s: "Ag", n: "銀", r: 5, c: 11 }, { s: "Cd", n: "カドミウム", r: 5, c: 12 }, { s: "In", n: "インジウム", r: 5, c: 13 }, { s: "Sn", n: "スズ", r: 5, c: 14 }, { s: "Sb", n: "アンチモン", r: 5, c: 15 }, { s: "Te", n: "テルル", r: 5, c: 16 }, { s: "I", n: "ヨウ素", r: 5, c: 17 }, { s: "Xe", n: "キセノン", r: 5, c: 18 },
    { s: "Cs", n: "セシウム", r: 6, c: 1 }, { s: "Ba", n: "バリウム", r: 6, c: 2 }, { s: "La", n: "ランタン", r: 6, c: 3 }, { s: "Ce", n: "セリウム", r: 9, c: 4 }, { s: "Pr", n: "プラセオジム", r: 9, c: 5 }, { s: "Nd", n: "ネオジム", r: 9, c: 6 }, { s: "Pm", n: "プロメチウム", r: 9, c: 7 }, { s: "Sm", n: "サマリウム", r: 9, c: 8 }, { s: "Eu", n: "ユウロピウム", r: 9, c: 9 }, { s: "Gd", n: "ガドリニウム", r: 9, c: 10 }, { s: "Tb", n: "テルビウム", r: 9, c: 11 }, { s: "Dy", n: "ジスプロシウム", r: 9, c: 12 }, { s: "Ho", n: "ホルミウム", r: 9, c: 13 }, { s: "Er", n: "エルビウム", r: 9, c: 14 }, { s: "Tm", n: "ツリウム", r: 9, c: 15 }, { s: "Yb", n: "イッテルビウム", r: 9, c: 16 }, { s: "Lu", n: "ルテチウム", r: 9, c: 17 }, { s: "Hf", n: "ハフニウム", r: 6, c: 4 }, { s: "Ta", n: "タンタル", r: 6, c: 5 }, { s: "W", n: "タングステン", r: 6, c: 6 }, { s: "Re", n: "レニウム", r: 6, c: 7 }, { s: "Os", n: "オスミウム", r: 6, c: 8 }, { s: "Ir", n: "イリジウム", r: 6, c: 9 }, { s: "Pt", n: "白金", r: 6, c: 10 }, { s: "Au", n: "金", r: 6, c: 11 }, { s: "Hg", n: "水銀", r: 6, c: 12 }, { s: "Tl", n: "タリウム", r: 6, c: 13 }, { s: "Pb", n: "鉛", r: 6, c: 14 }, { s: "Bi", n: "ビスマス", r: 6, c: 15 }, { s: "Po", n: "ポロニウム", r: 6, c: 16 }, { s: "At", n: "アスタチン", r: 6, c: 17 }, { s: "Rn", n: "ラドン", r: 6, c: 18 },
    { s: "Fr", n: "フランシウム", r: 7, c: 1 }, { s: "Ra", n: "ラジウム", r: 7, c: 2 }, { s: "Ac", n: "アクチニウム", r: 7, c: 3 }, { s: "Th", n: "トリウム", r: 10, c: 4 }, { s: "Pa", n: "プロトアクチニウム", r: 10, c: 5 }, { s: "U", n: "ウラン", r: 10, c: 6 }, { s: "Np", n: "ネプツニウム", r: 10, c: 7 }, { s: "Pu", n: "プルトニウム", r: 10, c: 8 }, { s: "Am", n: "アメリシウム", r: 10, c: 9 }, { s: "Cm", n: "キュリウム", r: 10, c: 10 }, { s: "Bk", n: "バークリウム", r: 10, c: 11 }, { s: "Cf", n: "カリホルニウム", r: 10, c: 12 }, { s: "Es", n: "アインスタイニウム", r: 10, c: 13 }, { s: "Fm", n: "フェルミウム", r: 10, c: 14 }, { s: "Md", n: "メンデレビウム", r: 10, c: 15 }, { s: "No", n: "ノーベリウム", r: 10, c: 16 }, { s: "Lr", n: "ローレンシウム", r: 10, c: 17 }, { s: "Rf", n: "ラザホージウム", r: 7, c: 4 }, { s: "Db", n: "ドブニウム", r: 7, c: 5 }, { s: "Sg", n: "シーボーギウム", r: 7, c: 6 }, { s: "Bh", n: "ボーリウム", r: 7, c: 7 }, { s: "Hs", n: "ハッシウム", r: 7, c: 8 }, { s: "Mt", n: "マイトネリウム", r: 7, c: 9 }, { s: "Ds", n: "ダームスタチウム", r: 7, c: 10 }, { s: "Rg", n: "レントゲニウム", r: 7, c: 11 }, { s: "Cn", n: "コペルニシウム", r: 7, c: 12 }, { s: "Nh", n: "ニホニウム", r: 7, c: 13 }, { s: "Fl", n: "フレロビウム", r: 7, c: 14 }, { s: "Mc", n: "モスコビウム", r: 7, c: 15 }, { s: "Lv", n: "リバモリウム", r: 7, c: 16 }, { s: "Ts", n: "テネシン", r: 7, c: 17 }, { s: "Og", n: "オガネソン", r: 7, c: 18 }
];

    let gameState = {
        players: [],
        currentPlayerIndex: 0,
        answered: new Set(),
        doubleZones: new Set(),
        isGameOver: false,
        maxLife: 0
    };

function initTable() {
    const tableDiv = document.getElementById('table');
    tableDiv.innerHTML = '';
    
    for (let r = 1; r <= 10; r++) {
        for (let c = 1; c <= 18; c++) {
            const cell = document.createElement('div');
            cell.className = 'element-cell';
            cell.id = `cell-${r}-${c}`;
            
            const element = ELEMENT_DATA.find(e => e.r === r && e.c === c);
            
            if (element) {
                // 記号と名前を両方入れる
                cell.innerHTML = `<div class="symbol">${element.s}</div><div class="name">${element.n}</div>`;
                cell.dataset.symbol = element.s;
            } else {
                cell.style.visibility = 'hidden';
                if (r === 8) cell.style.height = '20px';
            }
            tableDiv.appendChild(cell);
        }
    }
}

    function openModal() {
        document.getElementById('settingsModal').style.display = 'flex';
        updatePlayerNameInputs();
    }

    function updatePlayerNameInputs() {
        const count = document.getElementById('playerCount').value;
        const container = document.getElementById('playerNameContainer');
        container.innerHTML = '';
        for(let i=1; i<=count; i++) {
            container.innerHTML += `<div class="setting-item"><input type="text" id="pName${i}" value="プレイヤー${i}"></div>`;
        }
    }

function startGame() {
    const count = document.getElementById('playerCount').value;
    gameState.players = [];
    gameState.maxLife = parseInt(document.getElementById('lifeSetting').value);
    
    for(let i=1; i<=count; i++) {
        gameState.players.push({
            name: document.getElementById(`pName${i}`).value,
            score: 0,
            life: gameState.maxLife
        });
    }

    gameState.doubleZones.clear();
    // 2倍ルールの判定部分を修正
    if(document.getElementById('doubleRule').checked) {
        // ELEMENT_DATAからランダムに10個の記号を選ぶ
        while(gameState.doubleZones.size < 10) {
            const randomIndex = Math.floor(Math.random() * ELEMENT_DATA.length);
            const randomSymbol = ELEMENT_DATA[randomIndex].s; // .s で記号を取得
            gameState.doubleZones.add(randomSymbol);
        }
    }

    gameState.answered.clear();
    gameState.currentPlayerIndex = 0;
    gameState.isGameOver = false;
    
    initTable();
    
    // 2倍ゾーンの描画
    gameState.doubleZones.forEach(sym => {
        const cells = document.querySelectorAll(`[data-symbol="${sym}"]`);
        cells.forEach(c => c.classList.add('double-zone'));
    });

    document.getElementById('settingsModal').style.display = 'none';
    updateUI();
}

    function updateUI() {
        if(gameState.isGameOver) return;

        const currentP = gameState.players[gameState.currentPlayerIndex];
        document.getElementById('currentPlayerDisplay').innerText = `💡 ${currentP.name} のターン`;
        
        let statsHtml = '';
        gameState.players.forEach(p => {
            const lifeStr = gameState.maxLife > 0 ? ` | ❤️:${p.life}` : '';
            statsHtml += `<div>${p.name}: ${p.score}pt${lifeStr}</div>`;
        });
        document.getElementById('playerStats').innerHTML = statsHtml;
    }

function handleSubmit() {
    if(gameState.isGameOver) return;

    const input = document.getElementById('symbolInput');
    const symbol = input.value.trim(); // 入力された値
    const msg = document.getElementById('message');
    const currentP = gameState.players[gameState.currentPlayerIndex];

    // --- ここに判定ロジックを入れます ---

    // 1. そもそも実在するか判定
    const isValid = ELEMENT_DATA.some(e => e.s === symbol);
    
    // 2. すでに回答済みか判定
    const isAnswered = gameState.answered.has(symbol);

    if (!isValid) {
        // 実在しない場合：ペナルティ
        msg.innerText = `❌ 「${symbol}」は実在しません (-1pt)`;
        currentP.score--;
        if(gameState.maxLife > 0) currentP.life--;
    } else if (isAnswered) {
        // 実在するが回答済み：もう一度
        msg.innerText = `⚠️ 「${symbol}」は既に出ています！`;
        input.value = "";
        return; // ターンを交代せずに終了（もう一度入力させる）
    } else {
        // 正解：ポイント加算と周期表への反映
        msg.innerText = `✅ 「${symbol}」正解！`;
        gameState.answered.add(symbol);
        
        let points = 1;
        // 2倍ルール判定
        if(gameState.doubleZones.has(symbol)) {
            points = 2;
            msg.innerText = `🔥 2倍ゾーン！ 「${symbol}」で2pt獲得！`;
        }
        currentP.score += points;

        // 周期表の見た目を更新（塗りつぶし）
        const cells = document.querySelectorAll(`[data-symbol="${symbol}"]`);
        cells.forEach(c => c.classList.add('filled'));
    }

    // --- 判定後の処理 ---

    input.value = ""; // 入力欄をクリア

    // 終了判定（ポイントマイナスまたはライフ0）
    if (currentP.score < 0 || (gameState.maxLife > 0 && currentP.life <= 0)) {
        endGame(`${currentP.name} のライフまたはポイントが尽きました。`);
        return;
    }

    // 次のプレイヤーへ交代
    gameState.currentPlayerIndex = (gameState.currentPlayerIndex + 1) % gameState.players.length;
    updateUI();
}

    function surrender() {
        const currentP = gameState.players[gameState.currentPlayerIndex];
        endGame(`${currentP.name} が降参しました。`);
    }

function endGame(reason) {
    gameState.isGameOver = true;
    document.getElementById('currentPlayerDisplay').innerText = "🏁 GAME OVER";
    document.getElementById('message').innerText = reason;

    // --- 追加：未入力の元素を赤く表示 ---
    const allCells = document.querySelectorAll('.element-cell');
    allCells.forEach(cell => {
        // 元素が存在するマスで、かつ正解（filled）していない場合
        if (cell.dataset.symbol && !cell.classList.contains('filled')) {
            cell.classList.add('not-filled-end');
            // せっかくなので記号も見えるようにする
            cell.style.color = '#e74c3c';
        }
    });
    // ---------------------------------

    // 勝者判定
    const winner = [...gameState.players].sort((a,b) => b.score - a.score)[0];
    setTimeout(() => {
        alert(`${reason}\n優勝は ${winner.name} (${winner.score}pt) です！`);
    }, 500); // 少し間を置いてからアラートを出す
}

    // Enterキーで送信
    document.getElementById('symbolInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleSubmit();
    });

    initTable();
</script>

</body>
</html>
